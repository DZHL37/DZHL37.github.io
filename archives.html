    <link rel="stylesheet" href="assets.css">

<body>

    <div class="bg-orbs">

                    <div>

            <div class="footer-content glass glass-border-glow">

        <div class="panel"></div>
        <div class="panel" style="transition-delay: 0.04s;"></div>
        <div class="panel" style="transition-delay: 0.08s;"></div>
        <div class="panel" style="transition-delay: 0.12s;"></div>
        <div class="panel" style="transition-delay: 0.16s;"></div>
