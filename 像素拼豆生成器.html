<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>像素转换器 · 图片→像素风</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#0f0f1a;color:#eee;height:100vh;display:flex;flex-direction:column;overflow:hidden}
::selection{background:#ff6b9d44}

/* ===== 顶栏 ===== */
.topbar{display:flex;align-items:center;gap:8px;padding:8px 16px;background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.06);flex-wrap:wrap;backdrop-filter:blur(8px);flex-shrink:0}
.topbar .logo{font-size:18px;font-weight:700;color:#fff;background:linear-gradient(135deg,#ff6b9d,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.topbar select,.topbar .sel{padding:5px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#ddd;font-size:12px;outline:none;cursor:pointer;transition:all .2s}
.topbar select:hover,.topbar .sel:hover{border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.08)}
.topbar button{padding:5px 14px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-pink{background:linear-gradient(135deg,#ff6b9d,#c084fc);color:#fff}.btn-pink:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(255,107,157,0.3)}
.btn-ghost{background:rgba(255,255,255,0.05);color:#aaa;border:1px solid rgba(255,255,255,0.06)}.btn-ghost:hover{background:rgba(255,255,255,0.1);color:#fff}
.btn-sm{padding:4px 10px;font-size:11px}
.mode-group{display:inline-flex;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,0.08)}
.mode-btn{padding:4px 12px;font-size:12px;cursor:pointer;transition:all .2s;border:none;background:rgba(255,255,255,0.04);color:#888}
.mode-btn.active{background:#ff6b9d;color:#fff}

/* ===== 主体 ===== */
.main{flex:1;display:flex;min-height:0;padding:8px;gap:8px}
.left{flex:1;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.02);border-radius:12px;border:1px solid rgba(255,255,255,0.04);overflow:hidden;position:relative;min-width:0;touch-action:none}
.left canvas{max-width:100%;max-height:100%;display:block;image-rendering:pixelated}
.upload-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(15,15,26,0.85);z-index:5;flex-direction:column;gap:6px;backdrop-filter:blur(4px);transition:opacity .3s}
.upload-overlay.hide{opacity:0;pointer-events:none}
.upload-overlay .icon{font-size:40px;filter:drop-shadow(0 4px 12px rgba(255,107,157,0.3))}
.upload-overlay p{font-size:13px;color:#888}
.upload-overlay input{display:none}

/* ===== 裁切覆盖层 ===== */
.crop-overlay{position:absolute;inset:0;z-index:4;display:none;cursor:crosshair;touch-action:none}
.crop-overlay.show{display:block}
.crop-overlay .crop-bg{position:absolute;inset:0;background:rgba(0,0,0,0.55)}
.crop-overlay .crop-box{position:absolute;border:2px dashed #fff;box-shadow:0 0 0 9999px rgba(0,0,0,0.55);cursor:move}
.crop-overlay .crop-handle{position:absolute;width:14px;height:14px;background:#ff6b9d;border:2px solid #fff;border-radius:50%;z-index:2}
.crop-overlay .crop-handle.tl{top:-7px;left:-7px;cursor:nwse-resize}
.crop-overlay .crop-handle.tr{top:-7px;right:-7px;cursor:nesw-resize}
.crop-overlay .crop-handle.bl{bottom:-7px;left:-7px;cursor:nesw-resize}
.crop-overlay .crop-handle.br{bottom:-7px;right:-7px;cursor:nwse-resize}
.crop-bar{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);z-index:6;display:flex;gap:8px;display:none}
.crop-bar.show{display:flex}

/* ===== 右侧 ===== */
.right{width:280px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;overflow-y:auto;padding-right:4px}
.right::-webkit-scrollbar{width:3px}
.right::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:4px}

.panel{background:rgba(255,255,255,0.02);border-radius:10px;border:1px solid rgba(255,255,255,0.04);padding:10px;flex-shrink:0}
.panel-title{font-size:11px;color:#888;margin-bottom:6px;display:flex;align-items:center;gap:4px}

.tool-row{display:flex;gap:4px;flex-wrap:wrap;align-items:center}

/* 视图切换标签 */
.tab-group{display:flex;gap:2px;background:rgba(255,255,255,0.03);border-radius:6px;padding:2px}
.tab-group span{padding:3px 10px;border-radius:5px;font-size:11px;cursor:pointer;color:#888;transition:all .2s}
.tab-group span.active{background:rgba(255,255,255,0.1);color:#eee}

/* 滑块 */
.slider-row{display:flex;align-items:center;gap:6px;margin:3px 0}
.slider-row label{font-size:11px;color:#888;min-width:44px;flex-shrink:0}
.slider-row input[type=range]{flex:1;height:3px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,0.08);border-radius:2px;outline:none}
.slider-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#ff6b9d;cursor:pointer;border:2px solid rgba(255,255,255,0.2)}
.slider-row .val{font-size:10px;color:#888;min-width:20px;text-align:right}

/* 缩略图栏 */
.thumb-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.thumb-item{width:44px;height:44px;border-radius:6px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all .2s;position:relative;flex-shrink:0;background:rgba(255,255,255,0.04)}
.thumb-item.active{border-color:#ff6b9d}
.thumb-item img{width:100%;height:100%;object-fit:cover}
.thumb-item .del{cursor:pointer;position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:#ff6b9d;color:#fff;font-size:10px;display:none;align-items:center;justify-content:center;border:none}
.thumb-item:hover .del{display:flex}
.thumb-add{width:44px;height:44px;border-radius:6px;border:1px dashed rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#888;font-size:18px;transition:all .2s;flex-shrink:0}
.thumb-add:hover{border-color:#ff6b9d;color:#ff6b9d}

/* 色表 */
.color-table{max-height:160px;overflow-y:auto;border-radius:6px}
.color-table::-webkit-scrollbar{width:2px}
.color-table::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:2px}
.color-table table{width:100%;border-collapse:collapse;font-size:10px}
.color-table th,.color-table td{padding:2px 6px;text-align:center;border:1px solid rgba(255,255,255,0.03)}
.color-table th{color:#888;font-weight:400;font-size:9px}
.swatch{width:14px;height:14px;border-radius:3px;display:inline-block;border:1px solid rgba(255,255,255,0.08);vertical-align:middle}

.info{font-size:10px;color:#888;padding:4px 0}

/* 预设 */
.presets{display:flex;gap:4px;flex-wrap:wrap}
.presets span{padding:3px 10px;border-radius:6px;font-size:11px;cursor:pointer;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.04);color:#888;transition:all .2s}
.presets span:hover{background:rgba(255,255,255,0.07);color:#bbb}

/* 导出弹窗 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{background:#1a1a2e;border-radius:14px;border:1px solid rgba(255,255,255,0.08);padding:20px;min-width:360px;max-width:90vw}
.modal h3{font-size:16px;margin-bottom:10px;color:#ff6b9d}
.modal label{font-size:12px;color:#888;display:block;margin:6px 0 3px}
.modal select,.modal input[type=number]{width:100%;padding:6px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#ddd;font-size:12px;outline:none}
.modal .modal-btns{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}

/* 自定义尺寸内联输入 */
.custom-size-wrap{display:none;align-items:center;gap:4px}
.custom-size-wrap.show{display:inline-flex}
.custom-size-wrap input{width:60px;padding:4px 6px;border-radius:6px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#ddd;font-size:12px;outline:none}
.custom-size-wrap input:focus{border-color:#ff6b9d}

/* 加载指示器 */
.loading-overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(15,15,26,0.7);z-index:10;backdrop-filter:blur(2px)}
.loading-overlay.show{display:flex}
.loading-spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,0.1);border-top-color:#ff6b9d;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* 动画 */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease-out}

@media(max-width:800px){.right{width:220px}.topbar{gap:4px;padding:6px 10px}}
@media(max-width:600px){.main{flex-direction:column}.right{width:100%;max-height:240px}}
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">🧩 像素转换</span>
  <select id="pixelSize" onchange="checkCustomSize(this)" aria-label="像素尺寸">
    <option value="32">32</option><option value="48">48</option>
    <option value="64">64</option><option value="80">80</option>
    <option value="100" selected>100</option><option value="120">120</option>
    <option value="150">150</option><option value="200">200</option>
    <option value="250">250</option><option value="300">300</option>
    <option value="custom">✏️ 自定义</option>
  </select>
  <span class="custom-size-wrap" id="customSizeWrap">
    <input type="number" id="customSizeInput" min="4" max="1000" value="128" placeholder="4-1000" aria-label="自定义像素尺寸">
    <button class="btn-pink btn-sm" onclick="applyCustomSize()">✓</button>
  </span>
  <select id="paletteSelect" onchange="switchPalette(this.value)" aria-label="色板选择">
    <option value="mard">🎨 MARD 291色</option>
    <option value="bw">⚫ 黑白 2色</option>
  </select>
  <span class="mode-group">
    <span class="mode-btn active" data-mode="color" onclick="switchMode('color')" role="button" tabindex="0">🌈 彩色</span>
    <span class="mode-btn" data-mode="bw" onclick="switchMode('bw')" role="button" tabindex="0">⚫ 黑白</span>
  </span>
  <button class="btn-pink btn-sm" onclick="processImage()" aria-label="生成像素图">✨ 生成</button>
  <button class="btn-ghost btn-sm" onclick="saveResult()" aria-label="保存结果">💾 保存</button>
  <button class="btn-ghost btn-sm" onclick="showExportModal()" aria-label="导出图纸">🖨️ 图纸</button>
  <button class="btn-ghost btn-sm" onclick="resetUpload()" style="color:#ff6b9d" aria-label="更换图片">🔄 换图</button>
</div>

<div class="main">

  <div class="left" id="leftPanel">
    <canvas id="canvas" aria-label="像素画布"></canvas>
    <div class="upload-overlay" id="uploadOverlay" onclick="document.getElementById('fileInput').click()">
      <div class="icon">🖼️</div>
      <p>点击或拖拽上传照片</p>
      <input type="file" id="fileInput" accept="image/*" multiple onchange="loadImages(event)">
    </div>
    <div class="crop-overlay" id="cropOverlay">
      <div class="crop-bg"></div>
      <div class="crop-box" id="cropBox">
        <div class="crop-handle tl"></div>
        <div class="crop-handle tr"></div>
        <div class="crop-handle bl"></div>
        <div class="crop-handle br"></div>
      </div>
    </div>
    <div class="crop-bar" id="cropBar">
      <button class="btn-ghost btn-sm" onclick="cancelCrop()">取消</button>
      <button class="btn-pink btn-sm" onclick="applyCrop()">✓ 应用裁切</button>
    </div>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-spinner"></div>
    </div>
  </div>

  <div class="right" id="rightPanel">

    <!-- 视图切换 -->
    <div class="panel">
      <div class="tool-row" style="justify-content:space-between">
        <span class="tab-group">
          <span class="active" onclick="switchView('pixel',this)" role="button" tabindex="0">🎨 像素</span>
          <span onclick="switchView('numbered',this)" role="button" tabindex="0">🔢 编号</span>
          <span onclick="switchView('original',this)" role="button" tabindex="0">📷 原图</span>
        </span>
        <span class="tool-row" style="gap:3px">
          <span class="btn-ghost btn-sm" onclick="zoomBy(1.3)" style="padding:2px 7px" role="button" tabindex="0" aria-label="放大">🔍+</span>
          <span id="zl" style="min-width:28px;text-align:center;font-size:10px;color:#888">1×</span>
          <span class="btn-ghost btn-sm" onclick="zoomBy(1/1.3)" style="padding:2px 7px" role="button" tabindex="0" aria-label="缩小">🔍-</span>
          <span class="btn-ghost btn-sm" onclick="resetView()" style="padding:2px 7px" role="button" tabindex="0" aria-label="重置视图">↩</span>
          <span id="lockBtn" class="btn-ghost btn-sm" onclick="toggleLock()" style="padding:2px 7px;color:#ff6b9d" role="button" tabindex="0" aria-label="锁定/解锁">🔓</span>
          <span class="btn-ghost btn-sm" onclick="enterCropMode()" style="padding:2px 7px" role="button" tabindex="0" title="裁切" aria-label="裁切">✂️</span>
        </span>
      </div>
    </div>

    <!-- 风格调节滑块 -->
    <div class="panel">
      <div class="panel-title">🎛️ 风格调节</div>
      <div class="slider-row"><label>抖动</label><input type="range" id="ditherAmount" min="0" max="100" value="30" oninput="updateSliderVal(this);scheduleProcess()"><span class="val" id="ditherVal">30</span></div>
      <div class="slider-row"><label>锐度</label><input type="range" id="sharpness" min="0" max="100" value="50" oninput="updateSliderVal(this);scheduleProcess()"><span class="val" id="sharpnessVal">50</span></div>
      <div class="slider-row"><label>对比度</label><input type="range" id="contrast" min="0" max="100" value="50" oninput="updateSliderVal(this);scheduleProcess()"><span class="val" id="contrastVal">50</span></div>
      <div class="slider-row"><label>亮度</label><input type="range" id="brightness" min="0" max="100" value="50" oninput="updateSliderVal(this);scheduleProcess()"><span class="val" id="brightnessVal">50</span></div>
    </div>

    <!-- 批量缩略图 -->
    <div class="panel">
      <div class="panel-title">📦 图片列表 <span id="imgCount" style="color:#888;font-size:10px">0张</span></div>
      <div class="thumb-row" id="thumbRow">
        <div class="thumb-add" onclick="document.getElementById('fileInput').click()" title="添加图片">+</div>
      </div>
    </div>

    <!-- 色表 -->
    <div class="panel" id="colorPanel" style="display:none">
      <div class="panel-title" style="display:flex;justify-content:space-between">
        <span>🎨 色表 <span id="colorCount" style="color:#888;font-size:10px"></span></span>
        <span id="paletteName" style="color:#ff6b9d;font-size:10px">MARD 291</span>
      </div>
      <div class="color-table"><table><thead><tr><th>色号</th><th>色</th><th>值</th><th>数</th></tr></thead><tbody id="colorBody"></tbody></table></div>
    </div>

    <!-- 预设 -->
    <div class="panel">
      <div class="panel-title">📌 预设图案</div>
      <div class="presets">
        <span onclick="loadPreset('rainbow')">🌈 彩虹</span>
        <span onclick="loadPreset('gradient')">🎨 渐变</span>
        <span onclick="loadPreset('pattern')">🔲 格子</span>
        <span onclick="loadPreset('photo')">📷 照片</span>
      </div>
    </div>

    <div class="info" id="info"></div>
  </div>
</div>

<!-- 导出弹窗 -->
<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <h3>🖨️ 导出拼豆图纸</h3>
    <label>纸张尺寸</label>
    <select id="paperSize"><option value="a4">A4 (210×297mm)</option><option value="a3">A3 (297×420mm)</option><option value="letter">Letter (216×279mm)</option></select>
    <label>每格大小</label>
    <select id="gridSize"><option value="8">8mm（小）</option><option value="10" selected>10mm（标准）</option><option value="12">12mm（大）</option></select>
    <label>显示内容</label>
    <select id="exportContent"><option value="color">彩色格子</option><option value="numbered">编号 + 色块</option><option value="both" selected>彩格 + 编号</option></select>
    <div class="modal-btns">
      <button class="btn-ghost" onclick="closeExportModal()">取消</button>
      <button class="btn-pink" onclick="doExport()">📥 导出图片</button>
    </div>
  </div>
</div>

// ===== 工具函数 =====
function $(id) { return document.getElementById(id); }
function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

function debounce(fn, delay) {
  return function() {
    var args = arguments, ctx = this;
    if (S._processTimer) clearTimeout(S._processTimer);
    S._processTimer = setTimeout(function() {
      fn.apply(ctx, args);
      S._processTimer = null;
    }, delay);
  };
}

function showLoading() { loadingOverlay.classList.add('show'); }
function hideLoading() { loadingOverlay.classList.remove('show'); }

// 滑块防抖处理（200ms 延迟，避免拖动时频繁重算）
var scheduleProcess = debounce(function() {

}, 200);

function updateSliderVal(el) {

function updateZoomLabel() {
  zlEl.textContent = S.viewScale.toFixed(2) + 'x';
}

function getPalette(name) { return PALETTES[name] || PALETTES.mard; }

function getActiveColors() {
  return getPalette(S.currentPalette).colors.map(function(c) {
    var h = c.hex;
    return { id: c.id, r: parseInt(h.slice(1,3),16), g: parseInt(h.slice(3,5),16), b: parseInt(h.slice(5,7),16) };
  });
}

// 获取当前显示用的色板名称（BW 模式下显示灰度而非 MARD）
function getDisplayPaletteName() {
  if (S.currentMode === 'bw') return '16阶灰度';
  return getPalette(S.currentPalette).name;
}

// ===== 自定义像素尺寸（内联输入，替代 prompt） =====
function checkCustomSize(sel) {
  var wrap = $('customSizeWrap');
  if (sel.value !== 'custom') {
    wrap.classList.remove('show');
    if (S.pixelData) processImage();
    return;
  }
  wrap.classList.add('show');
  $('customSizeInput').focus();
  $('customSizeInput').select();
}

function applyCustomSize() {
  var input = $('customSizeInput');
  var v = parseInt(input.value);
  if (!v || v < 4 || v > 1000) { v = 100; input.value = v; }
  var sel = $('pixelSize');
  // 检查是否已有相同值的选项
  for (var i = 0; i < sel.options.length; i++) {
    if (sel.options[i].value == v) { sel.selectedIndex = i; $('customSizeWrap').classList.remove('show'); if (S.pixelData) processImage(); return; }
  }
  var opt = document.createElement('option');
  opt.value = v; opt.text = v + ' ☆';
  sel.insertBefore(opt, sel.lastElementChild);
  sel.value = v;
  $('customSizeWrap').classList.remove('show');
  if (S.pixelData) processImage();
}

// ===== 色板切换 =====
function switchPalette(name) {
  S.currentPalette = name;
  $('paletteName').textContent = getDisplayPaletteName();
  if (S.pixelData) processImage();
}

// ===== 加载图片 =====
function loadImages(e) {
  var files = e.target.files;
  if (!files.length) return;
  for (var f = 0; f < files.length; f++) {
    (function(file) {
      var reader = new FileReader();
      reader.onload = function(ev) {
        var img = new Image();
        img.onload = function() {
          S.images.push({ img: img, name: file.name });
          if (S.currentImageIdx < 0) { S.currentImageIdx = 0; displayImage(0); }
          updateThumbnails();
        };
        img.onerror = function() { console.warn('图片加载失败:', file.name); };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    })(files[f]);
  }
}

function displayImage(idx) {
  if (idx < 0 || idx >= S.images.length) return;
  S.currentImageIdx = idx;
  S.originalImage = S.images[idx].img;
  uploadOverlay.classList.add('hide');
  $('imgCount').textContent = S.images.length + '张';
  updateThumbnails();
  // 直接显示原图预览
  var px = leftPanel;
  canvas.width = px.clientWidth - 4; canvas.height = px.clientHeight - 4;
  var ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0f0f1a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  var asp = S.originalImage.width / S.originalImage.height;
  var dw = canvas.width, dh = canvas.width / asp;
  if (dh > canvas.height) { dh = canvas.height; dw = canvas.height * asp; }
  var ox = (canvas.width - dw) / 2, oy = (canvas.height - dh) / 2;
  ctx.imageSmoothingEnabled = true; ctx.drawImage(S.originalImage, ox, oy, dw, dh);
  processImage();
}

function updateThumbnails() {
  var row = $('thumbRow');
  row.innerHTML = '';
  S.images.forEach(function(img, i) {
    var div = document.createElement('div');
    div.className = 'thumb-item' + (i === S.currentImageIdx ? ' active' : '');
    var im = document.createElement('img'); im.src = img.img.src;
    div.appendChild(im);
    var del = document.createElement('button');
    del.className = 'del'; del.textContent = '✕';
    del.onclick = function(e) { e.stopPropagation(); removeImage(i); };
    div.appendChild(del);
    div.onclick = function() { displayImage(i); };
    row.appendChild(div);
  });
  var add = document.createElement('div');
  add.className = 'thumb-add'; add.textContent = '+';
  add.onclick = function() { $('fileInput').click(); };
  row.appendChild(add);
  $('imgCount').textContent = S.images.length + '张';
}

function removeImage(idx) {
  S.images.splice(idx, 1);
  if (S.currentImageIdx >= S.images.length) S.currentImageIdx = S.images.length - 1;
  if (S.currentImageIdx < 0) { resetUpload(); return; }
  displayImage(S.currentImageIdx);
}

function resetUpload() {
  uploadOverlay.classList.remove('hide');
  $('colorPanel').style.display = 'none';
  $('info').textContent = '';
  S.originalImage = null; S.pixelData = null; S.offscreen = {};
  S.images = []; S.currentImageIdx = -1;
  canvas.width = 1; canvas.height = 1; // 避免宽高为 0 的警告
  $('thumbRow').innerHTML = '<div class="thumb-add" onclick="document.getElementById(\'fileInput\').click()">+</div>';
  $('imgCount').textContent = '0张';
}

// ===== 颜色量化 + Floyd-Steinberg 抖动 =====
function quantizeWithDither(imgData, w, h, colors, ditherAmount) {
  var d = imgData.data.slice();
  var cols = colors.map(function(c) { return { r: c.r, g: c.g, b: c.b }; });
  var amount = ditherAmount / 100;
  var len = cols.length;
  for (var y = 0; y < h; y++) {
    for (var x = 0; x < w; x++) {
      var i = (y * w + x) * 4;
      var oldR = d[i], oldG = d[i+1], oldB = d[i+2];
      // 找最近色
      var best = 0, bestDist = Infinity;
      for (var j = 0; j < len; j++) {
        var dr = oldR - cols[j].r, dg = oldG - cols[j].g, db = oldB - cols[j].b;
        var dist = dr*dr + dg*dg + db*db;
        if (dist < bestDist) { bestDist = dist; best = j; }
      }
      var newR = cols[best].r, newG = cols[best].g, newB = cols[best].b;
      d[i] = newR; d[i+1] = newG; d[i+2] = newB;
      // 误差扩散
      if (amount > 0) {
        var errR = (oldR - newR) * amount, errG = (oldG - newG) * amount, errB = (oldB - newB) * amount;
        if (x + 1 < w) { var ri = (y * w + x + 1) * 4; d[ri] += errR * 7/16; d[ri+1] += errG * 7/16; d[ri+2] += errB * 7/16; }
        if (y + 1 < h) {
          if (x > 0) { var li = ((y+1) * w + x - 1) * 4; d[li] += errR * 3/16; d[li+1] += errG * 3/16; d[li+2] += errB * 3/16; }
          var di = ((y+1) * w + x) * 4; d[di] += errR * 5/16; d[di+1] += errG * 5/16; d[di+2] += errB * 5/16;
          if (x + 1 < w) { var ri2 = ((y+1) * w + x + 1) * 4; d[ri2] += errR * 1/16; d[ri2+1] += errG * 1/16; d[ri2+2] += errB * 1/16; }
        }
      }
    }
  }
  return new ImageData(new Uint8ClampedArray(d), w, h);
}

// 无抖动快速量化（直接最近色，不扩散误差）
function quantizeNoDither(imgData, w, h, colors) {
  var d = imgData.data.slice();
  var len = colors.length;
  for (var i = 0; i < d.length; i += 4) {
    var best = 0, bestDist = Infinity;
    for (var j = 0; j < len; j++) {
      var dr = d[i] - colors[j].r, dg = d[i+1] - colors[j].g, db = d[i+2] - colors[j].b;
      var dist = dr*dr + dg*dg + db*db;
      if (dist < bestDist) { bestDist = dist; best = j; }
    }
    d[i] = colors[best].r; d[i+1] = colors[best].g; d[i+2] = colors[best].b;
  }
  return new ImageData(new Uint8ClampedArray(d), w, h);
}

// ===== 图像调节（对比度/亮度/锐度） =====
function adjustImage(data, w, h) {
  var d = data.slice();
  var contrast = parseInt($('contrast').value) / 50;
  var brightness = (parseInt($('brightness').value) - 50) / 50 * 60;
  var sharp = parseInt($('sharpness').value) / 50;

  // 对比度 + 亮度
  var c = (contrast - 1) * 128;
  var factor = (259 * (c + 255)) / (255 * (259 - c));
  for (var i = 0; i < d.length; i += 4) {
    d[i]   = clamp(Math.round(factor * (d[i]   - 128) + 128 + brightness), 0, 255);
    d[i+1] = clamp(Math.round(factor * (d[i+1] - 128) + 128 + brightness), 0, 255);
    d[i+2] = clamp(Math.round(factor * (d[i+2] - 128) + 128 + brightness), 0, 255);
  }

  // 简单锐化 (拉普拉斯)
  if (sharp !== 1) {
    var src = d.slice();
    var strength = (sharp - 1) * 0.8;
    for (var y = 1; y < h - 1; y++) {
      for (var x = 1; x < w - 1; x++) {
        var idx = (y * w + x) * 4;
        for (var ch = 0; ch < 3; ch++) {
          var lap = src[((y-1)*w+x)*4+ch] * -1 + src[(y*w+x-1)*4+ch] * -1 + src[(y*w+x)*4+ch] * 4 + src[(y*w+x+1)*4+ch] * -1 + src[((y+1)*w+x)*4+ch] * -1;
          d[idx+ch] = clamp(Math.round(src[idx+ch] + lap * strength), 0, 255);
        }
      }
    }
  }
  return new Uint8ClampedArray(d);
}

// ===== 核心处理 =====
function processImage() {
  if (!S.originalImage) return;
  var size = parseInt($('pixelSize').value);
  if (isNaN(size)) size = 100;
  var iw = S.originalImage.width, ih = S.originalImage.height, asp = iw / ih;
  var gw, gh;
  if (asp >= 1) { gw = size; gh = Math.max(1, Math.round(size / asp)); }
  else { gw = Math.max(1, Math.round(size * asp)); gh = size; }

  // 大图处理时显示加载指示器
  var isLarge = gw * gh > 10000;
  if (isLarge) showLoading();

  // 用 requestAnimationFrame 确保 loading 先渲染
  requestAnimationFrame(function() {
    _doProcess(gw, gh, isLarge);
  });
}

function _doProcess(gw, gh, isLarge) {
  canvas.width = gw; canvas.height = gh;
  var ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(S.originalImage, 0, 0, gw, gh);

  var rawData = ctx.getImageData(0, 0, gw, gh);
  var adjustedData = adjustImage(rawData.data, gw, gh);
  var adjustedImg = new ImageData(adjustedData, gw, gh);

  var beads = getActiveColors();
  var ditherAmt = parseInt($('ditherAmount').value);

  var finalData;
  if (S.currentMode === 'bw') {
    // 16阶灰度色板
    var grayColors = [];
    for (var gi = 0; gi < 16; gi++) { var v = Math.round(255 - gi * 17); grayColors.push({ id: ''+(gi+1), r: v, g: v, b: v }); }
    beads = grayColors;
    // BW 模式也区分有无抖动
    finalData = ditherAmt > 0
      ? quantizeWithDither(adjustedImg, gw, gh, beads, ditherAmt)
      : quantizeNoDither(adjustedImg, gw, gh, beads);
  } else {
    finalData = ditherAmt > 0
      ? quantizeWithDither(adjustedImg, gw, gh, beads, ditherAmt)
      : quantizeNoDither(adjustedImg, gw, gh, beads);
  }

  // ===== 一次性构建颜色查表缓存 =====
  var fd = finalData.data;
  var rgbToBead = new Map();      // "r,g,b" -> { id, index }
  var colorIndices = new Int32Array(gw * gh); // 每像素对应的色号索引
  var uColors = [];

  for (var b = 0; b < beads.length; b++) {
    var key = beads[b].r + ',' + beads[b].g + ',' + beads[b].b;
    if (!rgbToBead.has(key)) {
      var entry = { id: beads[b].id, index: uColors.length, r: beads[b].r, g: beads[b].g, b: beads[b].b, count: 0 };
      rgbToBead.set(key, entry);
      uColors.push(entry);
    }
  }

  for (var p = 0; p < colorIndices.length; p++) {
    var pi = p * 4;
    var pk = fd[pi] + ',' + fd[pi+1] + ',' + fd[pi+2];
    var entry = rgbToBead.get(pk);
    if (entry) {
      colorIndices[p] = entry.index;
      entry.count++;
    }
  }
  uColors.sort(function(a, b) { return b.count - a.count; });
  // 排序后重建 index 映射
  var idxMap = new Int32Array(uColors.length);
  for (var mi = 0; mi < uColors.length; mi++) idxMap[uColors[mi].index] = mi;

  ctx.putImageData(finalData, 0, 0); ctx.imageSmoothingEnabled = false;
  S.pixelData = {
    w: gw, h: gh, data: finalData, colors: uColors,
    numberedData: finalData,
    rgbToBead: rgbToBead,         // Map: "r,g,b" -> { id, index, count }
    colorIndices: colorIndices,    // Int32Array: 像素→色号索引（排序前）
    idxMap: idxMap                 // 排序后的索引映射
  };
  S.panX = 0; S.panY = 0; S.viewScale = 1; zlEl.textContent = '1x';

  S.offscreen = {};
  S.offscreen.pixel = buildOffscreen('pixel');
  S.offscreen.original = buildOffscreen('original');
  S.offscreen.numbered = buildOffscreen('numbered');

  if (S.offscreen[S.currentView]) {
    var r = leftPanel.getBoundingClientRect();
    S.viewScale = Math.min((r.width - 20) / S.offscreen[S.currentView].width, (r.height - 20) / S.offscreen[S.currentView].height);
    zlEl.textContent = S.viewScale.toFixed(1) + 'x';
  }
  renderCurrent();
  showColorTable();
  $('info').textContent = '尺寸: ' + gw + 'x' + gh + ' | 色: ' + uColors.length + ' | 豆: ' + (gw*gh) + '颗 | ' + getDisplayPaletteName();
  $('colorPanel').style.display = '';
  $('colorCount').textContent = '(' + uColors.length + '色)';
  $('paletteName').textContent = getDisplayPaletteName();
  if (isLarge) hideLoading();
}

function buildOffscreen(view) {
  if (!S.pixelData) return null;
  var pd = S.pixelData, B = BEAD_SIZE, W = pd.w * B, H = pd.h * B;
  var oc = document.createElement('canvas');
  oc.width = W; oc.height = H;
  var cx = oc.getContext('2d');
  var d = (pd.numberedData || pd.data).data;
  if (view === 'pixel' || view === 'numbered') {
    for (var y = 0; y < pd.h; y++) {
      for (var x = 0; x < pd.w; x++) {
        var i = (y * pd.w + x) * 4;
        cx.fillStyle = 'rgb(' + d[i] + ',' + d[i+1] + ',' + d[i+2] + ')';
        cx.fillRect(x * B, y * B, B, B);
      }
    }
  }
  if (view === 'original' && S.originalImage) {
    cx.drawImage(S.originalImage, 0, 0, W, H);
  }
  return oc;
}

function renderCurrent() {
  var oc = S.offscreen ? S.offscreen[S.currentView] : null;
  if (!oc) return;
  var ctx = canvas.getContext('2d');
  var r = leftPanel.getBoundingClientRect();
  canvas.width = r.width; canvas.height = r.height;
  ctx.fillStyle = '#0f0f1a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  var sw = oc.width * S.viewScale, sh = oc.height * S.viewScale;
  var ox = (canvas.width - sw) / 2 + S.panX, oy = (canvas.height - sh) / 2 + S.panY;
  ctx.imageSmoothingEnabled = false; ctx.drawImage(oc, ox, oy, sw, sh);

  // 编号视图：用预建的 colorIndices 查表，O(1) 取色号
  if (S.currentView === 'numbered' && S.pixelData) {
    var cs2 = BEAD_SIZE * S.viewScale;
    if (cs2 >= 13) {
      var pd = S.pixelData, cs = pd.colors, ci = pd.colorIndices, im = pd.idxMap;
      for (var y = 0; y < pd.h; y++) {
        for (var x = 0; x < pd.w; x++) {
          var px = ox + x * BEAD_SIZE * S.viewScale, py = oy + y * BEAD_SIZE * S.viewScale;
          if (px > -cs2 && px < canvas.width + cs2 && py > -cs2 && py < canvas.height + cs2) {
            var rawIdx = ci[y * pd.w + x];
            var sortedIdx = im[rawIdx];
            var col = cs[sortedIdx];
            var bid = col.id || (sortedIdx + 1);
            var lum = col.r * 0.299 + col.g * 0.587 + col.b * 0.114;
            ctx.fillStyle = lum > 128 ? '#333' : '#fff';
            ctx.font = 'bold ' + Math.max(7, Math.min(cs2 * 0.36, 16)) + 'px monospace';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(bid, px + cs2 / 2, py + cs2 / 2);
          }
        }
      }
    }
  }
}

function switchView(view, el) {
  document.querySelectorAll('.tab-group span').forEach(function(a) { a.classList.remove('active'); });
  el.classList.add('active');
  S.currentView = view;
  if (!S.offscreen[view]) S.offscreen[view] = buildOffscreen(view);
  renderCurrent();
}

function zoomBy(factor) {
  S.viewScale = clamp(S.viewScale * factor, 0.05, 20);
  updateZoomLabel();
  renderCurrent();
}

function resetView() {
  S.panX = 0; S.panY = 0;
  var oc = S.offscreen ? S.offscreen[S.currentView] : null;
  if (oc) {
    var r = leftPanel.getBoundingClientRect();
    S.viewScale = Math.min((r.width - 20) / oc.width, (r.height - 20) / oc.height);
  }
  zlEl.textContent = S.viewScale.toFixed(1) + 'x';
  renderCurrent();
}

function toggleLock() {
  S.isLocked = !S.isLocked;
  var b = $('lockBtn');
  b.textContent = S.isLocked ? '🔒' : '🔓';
  b.style.color = S.isLocked ? '#888' : '#ff6b9d';
}

// ===== 裁切功能 =====
function enterCropMode() {
  if (!S.originalImage) return;
  S.cropOrigImg = S.originalImage;
  S.cropMode = true;
  var r = leftPanel.getBoundingClientRect();
  canvas.width = r.width - 4; canvas.height = r.height - 4;
  var ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0f0f1a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  var asp = S.originalImage.width / S.originalImage.height;
  var dw = canvas.width, dh = canvas.width / asp;
  if (dh > canvas.height) { dh = canvas.height; dw = canvas.height * asp; }
  var ox = (canvas.width - dw) / 2, oy = (canvas.height - dh) / 2;
  ctx.imageSmoothingEnabled = true; ctx.drawImage(S.originalImage, ox, oy, dw, dh);
  S.cropStart = { x: ox, y: oy }; S.cropEnd = { x: ox + dw, y: oy + dh };
  S.cropImgData = { ox: ox, oy: oy, dw: dw, dh: dh, iw: S.originalImage.width, ih: S.originalImage.height };
  $('cropOverlay').classList.add('show');
  $('cropBar').classList.add('show');
  updateCropBox();
}

function updateCropBox() {
  var box = $('cropBox');
  box.style.left = Math.min(S.cropStart.x, S.cropEnd.x) + 'px';
  box.style.top = Math.min(S.cropStart.y, S.cropEnd.y) + 'px';
  box.style.width = Math.abs(S.cropEnd.x - S.cropStart.x) + 'px';
  box.style.height = Math.abs(S.cropEnd.y - S.cropStart.y) + 'px';
}

function applyCrop() {
  if (!S.cropImgData) return;
  var x1 = Math.min(S.cropStart.x, S.cropEnd.x), y1 = Math.min(S.cropStart.y, S.cropEnd.y);
  var x2 = Math.max(S.cropStart.x, S.cropEnd.x), y2 = Math.max(S.cropStart.y, S.cropEnd.y);
  var d = S.cropImgData;
  var scaleX = d.iw / d.dw, scaleY = d.ih / d.dh;
  var sx = Math.max(0, (x1 - d.ox) * scaleX), sy = Math.max(0, (y1 - d.oy) * scaleY);
  var sw = Math.min(d.iw - sx, (x2 - d.ox) * scaleX - sx), sh = Math.min(d.ih - sy, (y2 - d.oy) * scaleY - sy);
  if (sw < 2 || sh < 2) { cancelCrop(); return; }
  // 裁切：直接用 canvas，不再转 Image（避免 toDataURL 有损+慢）
  var tc = document.createElement('canvas');
  tc.width = sw; tc.height = sh;
  var tctx = tc.getContext('2d');
  tctx.drawImage(S.originalImage, sx, sy, sw, sh, 0, 0, sw, sh);
  // 仍需 Image 对象供 drawImage 使用，但 canvas 本身也可直接用
  S.originalImage = tc; // canvas 可直接传给 drawImage
  cancelCrop();
  processImage();
}

function cancelCrop() {
  S.cropMode = false;
  $('cropOverlay').classList.remove('show');
  $('cropBar').classList.remove('show');
  if (S.originalImage) {
    var px = leftPanel;
    canvas.width = px.clientWidth - 4; canvas.height = px.clientHeight - 4;
    var ctx = canvas.getContext('2d');
    ctx.fillStyle = '#0f0f1a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    processImage();
  }
}

// 裁切框拖拽（支持鼠标 + 触屏）
(function() {
  var box = $('cropBox');
  var overlay = $('cropOverlay');
  var dragging = false, resizing = false, resizeDir = '', dragOffX = 0, dragOffY = 0, drawingNew = false;

  function getPos(e) {
    var rect = overlay.getBoundingClientRect();
    var t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - rect.left, y: t.clientY - rect.top };
  }

  function onStart(e) {
    if (!S.cropMode) return;
    e.preventDefault();
    var target = e.target;
    if (target.classList && target.classList.contains('crop-handle')) {
      resizing = true; resizeDir = target.className.split(' ')[1]; return;
    }
    if (target === box || target.parentElement === box) {
      dragging = true;
      dragOffX = e.touches ? e.touches[0].clientX - parseFloat(box.style.left) : e.clientX - parseFloat(box.style.left);
      dragOffY = e.touches ? e.touches[0].clientY - parseFloat(box.style.top) : e.clientY - parseFloat(box.style.top);
    } else {
      var p = getPos(e);
      S.cropStart = { x: p.x, y: p.y }; S.cropEnd = { x: p.x, y: p.y };
      updateCropBox();
      drawingNew = true;
    }
  }

  function onMove(e) {
    if (!S.cropMode) return;
    var d = S.cropImgData; if (!d) return;
    var p = getPos(e);
    var mx = p.x, my = p.y;
    if (resizing && resizeDir) {
      if (resizeDir.includes('r')) S.cropEnd.x = mx;
      if (resizeDir.includes('l')) S.cropStart.x = mx;
      if (resizeDir.includes('b')) S.cropEnd.y = my;
      if (resizeDir.includes('t')) S.cropStart.y = my;
      S.cropStart.x = clamp(S.cropStart.x, d.ox, d.ox + d.dw);
      S.cropStart.y = clamp(S.cropStart.y, d.oy, d.oy + d.dh);
      S.cropEnd.x = clamp(S.cropEnd.x, d.ox, d.ox + d.dw);
      S.cropEnd.y = clamp(S.cropEnd.y, d.oy, d.oy + d.dh);
      if (Math.abs(S.cropEnd.x - S.cropStart.x) < 20) { if (resizeDir.includes('r')) S.cropEnd.x = S.cropStart.x + 20; else S.cropStart.x = S.cropEnd.x - 20; }
      if (Math.abs(S.cropEnd.y - S.cropStart.y) < 20) { if (resizeDir.includes('b')) S.cropEnd.y = S.cropStart.y + 20; else S.cropStart.y = S.cropEnd.y - 20; }
      updateCropBox(); return;
    }
    if (drawingNew) {
      S.cropEnd.x = clamp(mx, d.ox, d.ox + d.dw);
      S.cropEnd.y = clamp(my, d.oy, d.oy + d.dh);
      updateCropBox(); return;
    }
    if (dragging) {
      var w = Math.abs(S.cropEnd.x - S.cropStart.x), h2 = Math.abs(S.cropEnd.y - S.cropStart.y);
      var nx = mx - dragOffX, ny = my - dragOffY;
      if (nx < d.ox) nx = d.ox; if (nx + w > d.ox + d.dw) nx = d.ox + d.dw - w;
      if (ny < d.oy) ny = d.oy; if (ny + h2 > d.oy + d.dh) ny = d.oy + d.dh - h2;
      var dx = nx - S.cropStart.x, dy = ny - S.cropStart.y;
      S.cropStart.x += dx; S.cropEnd.x += dx; S.cropStart.y += dy; S.cropEnd.y += dy;
      updateCropBox(); return;
    }
  }

  function onEnd() { dragging = false; resizing = false; drawingNew = false; }

  overlay.addEventListener('mousedown', onStart);
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onEnd);
  overlay.addEventListener('touchstart', onStart, { passive: false });
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('touchend', onEnd);
})();

// ===== 画布拖动/缩放（支持鼠标 + 触屏） =====
function getCanvasPos(e) {
  var t = e.touches ? e.touches[0] : e;
  return { x: t.clientX, y: t.clientY };
}

canvas.addEventListener('mousedown', function(e) {
  if (S.isLocked) return;
  S.isDragging = true;
  S.dragStartX = e.clientX - S.panX;
  S.dragStartY = e.clientY - S.panY;
  canvas.style.cursor = 'grabbing';
});

canvas.addEventListener('mousemove', function(e) {
  if (!S.isDragging) return;
  S.panX = e.clientX - S.dragStartX;
  S.panY = e.clientY - S.dragStartY;
  renderCurrent();
});

canvas.addEventListener('mouseup', function() {
  S.isDragging = false;
  if (!S.isLocked) canvas.style.cursor = 'grab';
});

canvas.addEventListener('mouseleave', function() { S.isDragging = false; });
canvas.style.cursor = 'grab';

canvas.addEventListener('wheel', function(e) {
  if (S.isLocked || S.cropMode) return;
  e.preventDefault();
  S.viewScale = clamp(S.viewScale * (e.deltaY > 0 ? 0.85 : 1.15), 0.05, 20);
  updateZoomLabel();
  renderCurrent();
}, { passive: false });

// 触屏拖动
canvas.addEventListener('touchstart', function(e) {
  if (S.isLocked || S.cropMode) return;
  if (e.touches.length === 1) {
    S.isDragging = true;
    var p = getCanvasPos(e);
    S.dragStartX = p.x - S.panX;
    S.dragStartY = p.y - S.panY;
  }
}, { passive: true });

canvas.addEventListener('touchmove', function(e) {
  if (!S.isDragging || S.cropMode) return;
  e.preventDefault();
  var p = getCanvasPos(e);
  S.panX = p.x - S.dragStartX;
  S.panY = p.y - S.dragStartY;
  renderCurrent();
}, { passive: false });

canvas.addEventListener('touchend', function() { S.isDragging = false; });

// 双指缩放
var pinchDist = 0;
canvas.addEventListener('touchstart', function(e) {
  if (e.touches.length === 2) {
    S.isDragging = false;
    var dx = e.touches[0].clientX - e.touches[1].clientX;
    var dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchDist = Math.sqrt(dx*dx + dy*dy);
  }
}, { passive: true });

canvas.addEventListener('touchmove', function(e) {
  if (e.touches.length === 2 && !S.cropMode) {
    e.preventDefault();
    var dx = e.touches[0].clientX - e.touches[1].clientX;
    var dy = e.touches[0].clientY - e.touches[1].clientY;
    var dist = Math.sqrt(dx*dx + dy*dy);
    if (pinchDist > 0) {
      S.viewScale = clamp(S.viewScale * (dist / pinchDist), 0.05, 20);
      updateZoomLabel();
      renderCurrent();
    }
    pinchDist = dist;
  }
}, { passive: false });

canvas.addEventListener('touchend', function(e) {
  if (e.touches.length < 2) pinchDist = 0;
});

// ===== 色表（用 DOM API 构建，避免 innerHTML 拼接） =====
function showColorTable() {
  var cs = S.pixelData.colors;
  var tb = $('colorBody');
  // 先拼完整字符串再一次性赋值（比循环 += 高效）
  var html = '';
  for (var i = 0; i < cs.length; i++) {
    var c = cs[i];
    var hex = '#' + c.r.toString(16).padStart(2,'0') + c.g.toString(16).padStart(2,'0') + c.b.toString(16).padStart(2,'0');
    var label = c.id || (i + 1);
    html += '<tr><td><b>' + label + '</b></td>'
      + '<td><span class="swatch" style="background:rgb(' + c.r + ',' + c.g + ',' + c.b + ')"></span></td>'
      + '<td style="font-size:9px;color:#888">' + hex + '</td>'
      + '<td>' + c.count + '</td></tr>';
  }
  tb.innerHTML = html;
}

// ===== 保存 =====
function saveResult() {
  var oc = S.offscreen ? S.offscreen[S.currentView] : null;
  if (!oc) return;
  var a = document.createElement('a');
  a.download = '像素转换_' + S.currentView + '_' + Date.now() + '.png';
  a.href = oc.toDataURL();
  a.click();
}

// ===== 导出图纸 =====
function showExportModal() {
  if (!S.pixelData) { alert('请先生成像素图'); return; }
  $('exportModal').classList.add('show');
}
function closeExportModal() { $('exportModal').classList.remove('show'); }

function doExport() {
  if (!S.pixelData) return;
  var pd = S.pixelData, gs = parseInt($('gridSize').value);
  var content = $('exportContent').value;
  var paper = $('paperSize').value;
  var dpi = 96;
  var pw, ph;
  if (paper === 'a4') { pw = 8.27 * dpi; ph = 11.69 * dpi; }
  else if (paper === 'a3') { pw = 11.69 * dpi; ph = 16.54 * dpi; }
  else { pw = 8.5 * dpi; ph = 11 * dpi; }

  var margin = 0.5 * dpi;
  var maxW = pw - 2 * margin, maxH = ph - 2 * margin;
  var cellSizePx = Math.floor(Math.min(maxW / pd.w, maxH / pd.h));
  if (cellSizePx < 4) cellSizePx = 4;
  var totalW = pd.w * cellSizePx, totalH = pd.h * cellSizePx;

  var oc = document.createElement('canvas');
  oc.width = pw; oc.height = ph;
  var cx = oc.getContext('2d');
  cx.fillStyle = '#fff'; cx.fillRect(0, 0, pw, ph);
  var ox = (pw - totalW) / 2, oy = (ph - totalH) / 2;

  var d = (pd.numberedData || pd.data).data;
  var ci = pd.colorIndices, im = pd.idxMap, cs = pd.colors;

  // 画格子（用预建查表，不再线性搜索）
  for (var y = 0; y < pd.h; y++) {
    for (var x = 0; x < pd.w; x++) {
      var pi = (y * pd.w + x) * 4;
      var r2 = d[pi], g2 = d[pi+1], b2 = d[pi+2];
      var px2 = ox + x * cellSizePx, py2 = oy + y * cellSizePx;
      if (content !== 'numbered') {
        cx.fillStyle = 'rgb(' + r2 + ',' + g2 + ',' + b2 + ')';
        cx.fillRect(px2, py2, cellSizePx, cellSizePx);
      }
      cx.strokeStyle = 'rgba(0,0,0,0.12)'; cx.lineWidth = 0.5;
      cx.strokeRect(px2, py2, cellSizePx, cellSizePx);
      if (content !== 'color' && cellSizePx >= 10) {
        var rawIdx = ci[y * pd.w + x];
        var sortedIdx = im[rawIdx];
        var col = cs[sortedIdx];
        var bid = col.id || (sortedIdx + 1);
        cx.fillStyle = (r2 * 0.299 + g2 * 0.587 + b2 * 0.114) > 160 ? '#333' : '#fff';
        cx.font = 'bold ' + Math.max(5, Math.min(cellSizePx * 0.35, 14)) + 'px monospace';
        cx.textAlign = 'center'; cx.textBaseline = 'middle';
        cx.fillText(bid, px2 + cellSizePx / 2, py2 + cellSizePx / 2);
      }
    }
  }

  // 标题
  cx.fillStyle = '#333'; cx.font = '12px sans-serif';
  cx.textAlign = 'center'; cx.textBaseline = 'bottom';
  var title = '拼豆图纸 — ' + pd.w + 'x' + pd.h + ' | ' + getDisplayPaletteName() + ' | 每格' + gs + 'mm';
  cx.fillText(title, pw / 2, ph - 8);

  // 图例
  var legY = ph - 30;
  cx.font = '8px sans-serif'; cx.textAlign = 'left'; cx.textBaseline = 'middle';
  var legX = ox;
  for (var c2 = 0; c2 < Math.min(cs.length, 20); c2++) {
    var col = cs[c2];
    cx.fillStyle = 'rgb(' + col.r + ',' + col.g + ',' + col.b + ')';
    cx.fillRect(legX, legY, 8, 8);
    cx.strokeStyle = '#ccc'; cx.lineWidth = 0.5; cx.strokeRect(legX, legY, 8, 8);
    cx.fillStyle = '#666'; cx.fillText(col.id || (c2 + 1), legX + 10, legY + 4);
    legX += 28;
    if (legX + 28 > pw - ox) { legY += 14; legX = ox; }
  }

  var a = document.createElement('a');
  a.download = '拼豆图纸_' + pd.w + 'x' + pd.h + '_' + Date.now() + '.png';
  a.href = oc.toDataURL();
  a.click();
  closeExportModal();
}

// ===== 预设 =====
function loadPreset(n) {
  var cx = document.createElement('canvas'); cx.width = 200; cx.height = 200;
  var ctx = cx.getContext('2d');
  if (n === 'rainbow') {
    var g = ctx.createLinearGradient(0, 0, 200, 200);
    g.addColorStop(0, '#f00'); g.addColorStop(.2, '#f80'); g.addColorStop(.4, '#ff0');
    g.addColorStop(.6, '#0f0'); g.addColorStop(.8, '#08f'); g.addColorStop(1, '#f0f');
    ctx.fillStyle = g; ctx.fillRect(0, 0, 200, 200);
  } else if (n === 'gradient') {
    for (var y = 0; y < 200; y++) { ctx.fillStyle = 'hsl(' + (y / 200 * 360) + ',80%,60%)'; ctx.fillRect(0, y, 200, 1); }
  } else if (n === 'pattern') {
    var cs = ['#e74c3c', '#f39c12', '#2ecc71', '#3498db', '#9b59b6', '#1abc9c'];
    for (var py = 0; py < 8; py++) for (var px = 0; px < 8; px++) { ctx.fillStyle = cs[(py+px) % cs.length]; ctx.fillRect(px*25, py*25, 25, 25); }
  } else if (n === 'photo') {
    for (var yy = 0; yy < 200; yy++) for (var xx = 0; xx < 200; xx++) {
      ctx.fillStyle = 'rgb(' + Math.round(150+Math.sin(xx*.05)*80+Math.cos(yy*.03)*40) + ','
        + Math.round(100+Math.cos(xx*.04+yy*.04)*60+Math.sin(xx*.06)*30) + ','
        + Math.round(180+Math.sin(yy*.05+xx*.03)*50+Math.cos(yy*.07)*30) + ')';
      ctx.fillRect(xx, yy, 1, 1);
    }
  }
  var img = new Image();
  img.onload = function() { S.images = [{ img: img, name: '预设-' + n }]; S.currentImageIdx = 0; displayImage(0); };
  img.src = cx.toDataURL();
}

// ===== 初始化拖拽上传 =====
uploadOverlay.addEventListener('dragover', function(e) {
  e.preventDefault();
  this.style.borderColor = '#ff6b9d';
  this.style.background = 'rgba(255,107,157,0.05)';
});
uploadOverlay.addEventListener('dragleave', function(e) {
  this.style.borderColor = 'transparent';
  this.style.background = '';
});
uploadOverlay.addEventListener('drop', function(e) {
  e.preventDefault();
  this.style.borderColor = 'transparent';
  this.style.background = '';
  if (e.dataTransfer.files.length) {
    $('fileInput').files = e.dataTransfer.files;
    loadImages({ target: { files: e.dataTransfer.files } });
  }
});

// 窗口大小变化时重新渲染
window.addEventListener('resize', function() {
  if (S.pixelData && !S.cropMode) renderCurrent();
});

// 自定义尺寸输入：回车确认
$('customSizeInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') applyCustomSize();
});

// 键盘快捷键
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === '1') switchView('pixel', document.querySelector('.tab-group span'));
  else if (e.key === '2') { var tabs = document.querySelectorAll('.tab-group span'); if (tabs[1]) switchView('numbered', tabs[1]); }
  else if (e.key === '3') { var tabs2 = document.querySelectorAll('.tab-group span'); if (tabs2[2]) switchView('original', tabs2[2]); }
  else if (e.key === '0') resetView();
  else if (e.key === '+' || e.key === '=') zoomBy(1.3);
  else if (e.key === '-') zoomBy(1/1.3);
});
</script>
